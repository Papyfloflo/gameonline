<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game</title>
  <style>
    body {
      margin: 0;
      background: grey;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    canvas {
      width: 10680;
      height: 1050px;
      background-image: url('/img/y-so-serious.png');
    }

    .leaderboard {
      position: absolute;
      color: white;
      padding: 8px;
      font-family: sans-serif;
      font-size: 14px;
      user-select: none;
      background: rgba(0, 0, 0, 0.4);
    }

    .username-input-container {
      flex-direction: column;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
    }

    #usernameInput {
      padding: 12px;
      border-radius: 20px;
      border: none;
      background: #475569;
      color: #cbd5e1;
    }

    #usernameForm button {
      padding: 8px 20px;
      border-radius: 100px;
      border: none;
      background-image: linear-gradient(to right, rgb(6, 182, 212), rgb(59, 130, 246));
      color: white;
      cursor: pointer;
    }

    #restartButton {
      display: none;
      padding: 16px 40px;
      border-radius: 100px;
      border: none;
      background-image: linear-gradient(to right, rgb(6, 182, 212), rgb(59, 130, 246));
      color: white;
      cursor: pointer;
    }

    #usernameForm {
      text-align: center;
    }
  </style>
</head>
<body>
  <div>
    <div class="leaderboard">
      <div id="bullets-left">Bullets left:</div>
      <br>
      <div style="margin-bottom: 10px;">Leaderboard:</div>
      <div id="playerLabels"></div>
    </div>
    <canvas></canvas>
  </div>

  <!-- Username input -->
  <div class="username-input-container">
    <h1 id="game-over" style="display: none; color: white;">Game Over</h1>
    <button id="restartButton">Restart</button>
    <form id="usernameForm">
      <h1 style="color: white;">Online multiplayer game</h1>
      <div>
        <input id="usernameInput" type="text" placeholder="Username">
      </div>
      <div>
        <p id="username-error" style="color: white;"></p>
      </div>
      <div style="margin-top: 8px">
        <button type="submit">Start!</button>
      </div>
    </form>
  </div>
  <!-- Username input end -->

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="./js/classes/Enemy.js"></script>
  <script src="./js/classes/Player.js"></script>
  <script src="./js/classes/Particle.js"></script>
  <script src="./js/classes/Projectile.js"></script>
  <script src="./js/frontend.js"></script>
  <script src="./js/eventListeners.js"></script>
</body>
</html>
